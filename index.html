<!DOCTYPE html>
<html>
<head>

<title>NeonVerse Radio - The Sound of Future City</title>

<meta name="description" content="NeonVerse Radio is an online station streaming AI music, synthwave, and futuristic beats 24/7. The sound of the future city.">

<meta name="keywords" content="AI music radio, synthwave radio, cyberpunk radio, neonverse radio">

<meta name="robots" content="index, follow">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
color:#00ffff;
font-family:Arial;
text-align:center;
padding:40px;
background-color:black;

background-image:
linear-gradient(#00ffff22 1px, transparent 1px),
linear-gradient(90deg, #00ffff22 1px, transparent 1px);

background-size:40px 40px;

animation:gridGlow 12s infinite alternate;
}

@keyframes gridGlow{
0%{ background-color:#000000; }
100%{ background-color:#020012; }
}

.radio-panel{
background:rgba(0,0,0,0.65);
border-radius:20px;
padding:30px;
max-width:700px;
margin:auto;
box-shadow:0 0 25px #00ffff33;
backdrop-filter:blur(8px);
}

h1{
font-size:clamp(36px, 8vw, 60px);
color:#ff00ff;
text-shadow:0 0 20px #ff00ff;
}

h2{
text-shadow:0 0 10px #00ffff;
}

.tagline{
font-size:20px;
margin-bottom:20px;
}

.listen-button{
display:inline-block;
padding:15px 40px;
margin:20px;
font-size:22px;
color:black;
background:#00ffff;
border-radius:10px;
text-decoration:none;
font-weight:bold;
animation:neonCycle 10s infinite;
}

@keyframes neonCycle{

0%{ background:#00ffff; box-shadow:0 0 10px #00ffff, 0 0 20px #00ffff; }
25%{ background:#00ff66; box-shadow:0 0 10px #00ff66, 0 0 20px #00ff66; }
50%{ background:#ffbf00; box-shadow:0 0 10px #ffbf00, 0 0 20px #ffbf00; }
75%{ background:#ff00ff; box-shadow:0 0 10px #ff00ff, 0 0 20px #ff00ff; }
100%{ background:#00ffff; box-shadow:0 0 10px #00ffff, 0 0 20px #00ffff; }

}

.listen-button:hover{
transform:scale(1.07);
}

/* PLAYER + METERS LAYOUT */

.player-row{
display:flex;
align-items:center;
justify-content:center;
gap:30px;
margin-top:20px;
}

/* RMS METER */

.rms-meter{
display:flex;
flex-direction:column-reverse;
gap:4px;
overflow:hidden;
height:100px;
animation:rmsLoop 2s infinite ease-in-out;
}

.segment{
width:16px;
height:8px;
border-radius:2px;
}

/* colors */

.green{ background:#00ff00; box-shadow:0 0 6px #00ff00; }
.yellow{ background:#ffff00; box-shadow:0 0 6px #ffff00; }
.red{ background:#ff0000; box-shadow:0 0 6px #ff0000; }

/* RMS rising animation */

@keyframes rmsLoop{

0%{ height:20px; }

25%{ height:60px; }

50%{ height:100px; }

75%{ height:70px; }

100%{ height:30px; }

}

/* PLAYER */

audio{
width:100%;
max-width:320px;
}

.nowplaying{
margin-top:30px;
font-size:20px;
color:#ffffff;
}

a{
color:#00ffff;
text-decoration:none;
font-weight:bold;
font-size:18px;
}

a:hover{
color:#ff00ff;
text-shadow:0 0 10px #ff00ff;
}

@media (max-width:600px){

.player-row{
flex-direction:column;
}

}

</style>

</head>

<body>

<div class="radio-panel">

<h1>NeonVerse Radio</h1>

<p class="tagline">The Sound of Future City</p>

<p>Streaming AI generated music, synthwave and futuristic soundscapes 24/7.</p>

<a class="listen-button" href="#player">LISTEN LIVE</a>

<div class="player-row">

<!-- LEFT METER -->

<div class="rms-meter">
<div class="segment green"></div>
<div class="segment green"></div>
<div class="segment green"></div>
<div class="segment green"></div>
<div class="segment yellow"></div>
<div class="segment yellow"></div>
<div class="segment red"></div>
<div class="segment red"></div>
</div>

<div id="player">

<h2>Live Player</h2>

<audio controls>
<source src="https://a9.asurahosting.com/listen/neonverse/radio.mp3" type="audio/mpeg">
</audio>

</div>

<!-- RIGHT METER -->

<div class="rms-meter">
<div class="segment green"></div>
<div class="segment green"></div>
<div class="segment green"></div>
<div class="segment green"></div>
<div class="segment yellow"></div>
<div class="segment yellow"></div>
<div class="segment red"></div>
<div class="segment red"></div>
</div>

</div>

<div class="nowplaying">

<h3>Now Playing</h3>

<p id="song">Loading...</p>

</div>

<h2>Explore NeonVerse</h2>

<p>
<a href="https://open.spotify.com/artist/6EBEIhjpBksal7cFrMHcbx">Spotify</a> |
<a href="https://yourpodcastlink.com" target="_blank">Podcast</a> |
<a href="https://www.reddit.com/r/NeonVerse/" target="_blank">Community</a> |
<a href="submit.html">Submit Music</a>
</p>

</div>

<script>

async function getNowPlaying(){

try{

let response = await fetch("https://a9.asurahosting.com/api/nowplaying/neonverse");

let data = await response.json();

document.getElementById("song").innerText =
data.now_playing.song.artist + " - " + data.now_playing.song.title;

}

catch{

document.getElementById("song").innerText = "Live broadcast in progress";

}

}

getNowPlaying();

setInterval(getNowPlaying,15000);

</script>

</body>
</html>
