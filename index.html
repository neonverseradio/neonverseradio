<!DOCTYPE html>
<html>
<head>

<title>NeonVerse Radio - The Sound of Future City</title>

<meta name="description" content="NeonVerse Radio is an online station streaming AI music, synthwave, and futuristic beats 24/7. The sound of the future city.">

<meta name="keywords" content="AI music radio, synthwave radio, cyberpunk radio, neonverse radio">

<meta name="robots" content="index, follow">

<style>

body{
background-image:url("toronto-neon.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-color:black;
color:#00ffff;
font-family:Arial;
text-align:center;
padding:40px;
}

/* dark overlay for readability */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
z-index:-1;
}

h1{
font-size:60px;
color:#ff00ff;
text-shadow:0 0 20px #ff00ff;
}

.tagline{
font-size:20px;
margin-bottom:20px;
}

.listen-button{
display:inline-block;
padding:15px 40px;
margin:20px;
font-size:22px;
color:black;
background:#00ffff;
border-radius:10px;
text-decoration:none;
font-weight:bold;
animation:neonCycle 4s infinite;
}

@keyframes neonCycle{

0%{
background:#00ffff;
box-shadow:0 0 10px #00ffff, 0 0 20px #00ffff;
}

25%{
background:#00ff66;
box-shadow:0 0 10px #00ff66, 0 0 20px #00ff66;
}

50%{
background:#ffbf00;
box-shadow:0 0 10px #ffbf00, 0 0 20px #ffbf00;
}

75%{
background:#ff00ff;
box-shadow:0 0 10px #ff00ff, 0 0 20px #ff00ff;
}

100%{
background:#00ffff;
box-shadow:0 0 10px #00ffff, 0 0 20px #00ffff;
}

}

.listen-button:hover{
transform:scale(1.07);
}

audio{
margin-top:20px;
width:300px;
}

.nowplaying{
margin-top:30px;
font-size:20px;
color:#ffffff;
}

</style>

</head>

<body>

<h1>NeonVerse Radio</h1>

<p class="tagline">The Sound of Future City</p>

<p>Streaming AI generated music, synthwave and futuristic soundscapes 24/7.</p>

<a class="listen-button" href="#player">LISTEN LIVE</a>

<div id="player">

<h2>Live Player</h2>

<audio controls>
<source src="https://a9.asurahosting.com/listen/neonverse/radio.mp3" type="audio/mpeg">
</audio>

</div>

<div class="nowplaying">

<h3>Now Playing</h3>

<p id="song">Loading...</p>

</div>

<script>

async function getNowPlaying(){

try{

let response = await fetch("https://a9.asurahosting.com/api/nowplaying/neonverse");

let data = await response.json();

document.getElementById("song").innerText =
data.now_playing.song.artist + " - " + data.now_playing.song.title;

}

catch{

document.getElementById("song").innerText = "Live broadcast in progress";

}

}

getNowPlaying();

setInterval(getNowPlaying,15000);

</script>

</body>
</html>
